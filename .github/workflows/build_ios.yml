name: Build iOS IPA Unsigned

on:
  push:
    branches: [ "main" ] # Cứ push code lên nhánh main là kích hoạt build

jobs:
  build-ios:
    runs-on: macos-latest # Sử dụng máy ảo macOS của GitHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter pub get
          cd ios && 
          pod repo update && 
          pod install

      - name: Build iOS Application (No Sign)
        run: |
          # Biên dịch code sang dạng ứng dụng iOS nhưng chưa ký số bảo mật
          flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/ios/outputs/symbols

      - name: Pack App into IPA Archive
        run: |
          # Mẹo doanh nghiệp: Ép máy ảo đóng gói thư mục Runner.app thành file .ipa thành phẩm
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r ios-app-test.ipa Payload

      - name: Upload IPA Product to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: iphone-app-test # Tên thư mục chứa file trên GitHub sau khi build xong
          path: ios-app-test.ipa # Trả file .ipa về cho bạn tải xuống máy Windows